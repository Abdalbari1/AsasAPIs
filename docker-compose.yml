version: '3.4'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: asas-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=AsasPassword123!
    ports:
      - "1433:1433"

  asasapis:
    image: asasapis
    container_name: asas-api
    build:
      context: .
      dockerfile: AsasAPIs/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__AsasContext=Server=db;Database=SKY;User Id=sa;Password=AsasPassword123!;Encrypt=True;TrustServerCertificate=True;
    ports:
      - "5000:8080"
      - "5001:8081"
    depends_on:
      - db
